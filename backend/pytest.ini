[pytest]
# Restrict discovery to the dedicated pytest suite. The script-style
# tests at backend/ root (test_*.py) are still run by CI but as `python
# test_X.py` scripts, not via pytest -- they predate the pytest layer
# and use module-level `assert` rather than pytest test functions.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Quiet noisy third-party deprecation warnings so the relevant signal
# (our own DeprecationWarnings) stands out.
filterwarnings =
    ignore::DeprecationWarning:dotenv.*
    ignore::DeprecationWarning:pydantic.*
    # FastAPI on_event -> lifespan migration is its own follow-up
    ignore::DeprecationWarning:fastapi.*
    ignore:on_event is deprecated:DeprecationWarning
