version: 2

# Dependabot config for action-marshall.
# Groups related updates and runs weekly to minimize PR noise.
#
# We deliberately do NOT use `labels:` blocks here — labels would have to
# exist on the repo first or Dependabot prints "labels not found" warnings.
# Create the labels on GitHub if you want them, then add the labels: blocks
# back per ecosystem.
#
# `ignore:` rules below stop Dependabot from proposing breaking major
# version bumps on infra-sensitive packages. Patch and minor updates
# (including security fixes) still come through.

updates:
  # ── GitHub Actions ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # ── Python: SDK (pyproject.toml) ────────────────────
  - package-ecosystem: pip
    directory: "/sdk"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
      framework-extras:
        # Optional adapter extras are grouped so a LangChain bump
        # doesn't open six separate PRs alongside LangGraph etc.
        patterns:
          - "langchain*"
          - "langgraph*"
          - "crewai*"
          - "pyautogen*"
          - "mcp*"
          - "llama-index*"
          - "openai*"

  # ── Python: backend (requirements.txt) ──────────────
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # ── npm: UI ─────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      tooling:
        dependency-type: development
    ignore:
      # Refuse major version leaps on the Next.js + React stack;
      # these are nearly always breaking and need a planned upgrade.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ── npm: marketing website ──────────────────────────
  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ── Docker: backend image ───────────────────────────
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      # Pin Python base image to 3.11.x — major bumps need a manual
      # decision (e.g. confirming all deps are on the new Python).
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  # ── Docker: UI image ────────────────────────────────
  - package-ecosystem: docker
    directory: "/ui"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      # Pin Node base image major version — Node 20 LTS is the current target.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]