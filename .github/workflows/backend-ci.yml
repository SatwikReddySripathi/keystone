name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'sdk/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'sdk/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test backend + SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            sdk/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install SDK with dev extras
        working-directory: sdk
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --select=E9,F63,F7,F82 --output-format=github
        # E9/F63/F7/F82 = syntax errors, undefined names — only fail on real bugs,
        # not style. Tighten later once codebase is clean.

      - name: Run backend unit tests (script-style)
        env:
          DATABASE_PATH: ":memory:"
          PROOF_SECRET: "ci-test-secret"
          DEFAULT_ORG_ID: "org_demo"
          DEFAULT_API_KEY: "am_test_demo_key_001"
        run: |
          set -e
          for f in test_db.py test_simulator.py test_preview.py test_policy.py \
                   test_canary.py test_proof.py test_side_effect.py \
                   test_api.py test_approval_flow.py; do
            if [ -f "$f" ]; then
              echo "── Running $f ──"
              python "$f"
            fi
          done

      - name: Run SDK pytest suite
        working-directory: sdk
        run: pytest -v

      - name: Smoke test — start server and hit /health
        env:
          PROOF_SECRET: "ci-test-secret"
          DEFAULT_ORG_ID: "org_demo"
          DEFAULT_API_KEY: "am_test_demo_key_001"
        run: |
          uvicorn app.main:app --port 8000 &
          SERVER_PID=$!
          # wait up to 15s for the server to come up
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is up"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Backend never became healthy"
          kill $SERVER_PID || true
          exit 1
