name: Secret scan

# Runs gitleaks on every PR and on every push to main. Catches accidentally
# committed credentials (API keys, webhook URLs, private keys, .env contents)
# before they land on a public branch.
#
# See docs/security.md for the broader security model.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # gitleaks-action posts a summary comment on PRs if findings are present.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan past commits in addition to
          # the current diff. Catches secrets that may have leaked in
          # earlier (force-pushed-over) commits.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only needed for organisation-scale
          # commercial use; OSS use is free. Leave unset.
