version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/action_marshall.db
      - PROOF_SECRET=action_marshall-dev-secret-change-in-production
      - DEFAULT_ORG_ID=org_demo
      - DEFAULT_API_KEY=am_test_demo_key_001
    volumes:
      - action-marshall-data:/app/data

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_KEY=am_test_demo_key_001
    depends_on:
      - backend

volumes:
  action-marshall-data: